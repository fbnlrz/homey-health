<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    .redirect-uri {
      display: block;
      padding: 6px 8px;
      margin: 6px 0 12px;
      background: #f0f0f0;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      user-select: all;
    }
    ol li { margin-bottom: 8px; }
    .hy-nostyle { margin-top: 16px; }
    #report_output .report-sheet {
      background: #fff; color: #222; padding: 16px;
      border-radius: 8px; margin-top: 12px; overflow-x: auto;
    }
    @media print {
      body * { visibility: hidden; }
      #report_output, #report_output * { visibility: visible; }
      #report_output { position: absolute; left: 0; top: 0; width: 100%; }
      #report_output .noprint { display: none; }
    }
  </style>
</head>
<body>
  <h1 data-i18n="settings.title">Google Health</h1>
  <p data-i18n="settings.intro"></p>

  <ol>
    <li>
      <span data-i18n="settings.step1"></span>
      <a href="https://console.cloud.google.com/" target="_blank" rel="noopener">console.cloud.google.com</a>
    </li>
    <li>
      <span data-i18n="settings.step2"></span>
      <a href="https://console.cloud.google.com/apis/api/health.googleapis.com" target="_blank" rel="noopener">health.googleapis.com</a>
    </li>
    <li>
      <span data-i18n="settings.step3"></span>
      <code class="redirect-uri">https://callback.athom.com/oauth2/callback</code>
    </li>
    <li><span data-i18n="settings.step4"></span></li>
    <li><span data-i18n="settings.step5"></span></li>
  </ol>

  <fieldset>
    <legend data-i18n="settings.title"></legend>

    <div class="field row">
      <label for="client_id" data-i18n="settings.client_id">Client ID</label>
      <input id="client_id" type="text" value="" autocomplete="off" />
    </div>

    <div class="field row">
      <label for="client_secret" data-i18n="settings.client_secret">Client Secret</label>
      <input id="client_secret" type="password" value="" autocomplete="off" />
    </div>

    <div class="field row">
      <label>
        <input id="enable_write" type="checkbox" />
        <span data-i18n="settings.enable_write"></span>
      </label>
      <p><small data-i18n="settings.enable_write_hint"></small></p>
    </div>

    <div class="field row">
      <label>
        <input id="enable_cardiac" type="checkbox" />
        <span data-i18n="settings.enable_cardiac"></span>
      </label>
      <p><small data-i18n="settings.enable_cardiac_hint"></small></p>
    </div>
  </fieldset>

  <button id="save" class="hy-nostyle" data-i18n="settings.save">Save</button>

  <hr style="margin:24px 0" />

  <fieldset>
    <legend data-i18n="settings.report.title">Health report</legend>
    <p data-i18n="settings.report.intro"></p>

    <div class="field row">
      <label for="report_name" data-i18n="settings.report.patient_name">Name</label>
      <input id="report_name" type="text" autocomplete="off" />
    </div>

    <div class="field row">
      <label for="report_birthdate" data-i18n="settings.report.birthdate">Date of birth</label>
      <input id="report_birthdate" type="date" />
    </div>

    <div class="field row">
      <label for="report_gender" data-i18n="settings.report.gender">Gender</label>
      <select id="report_gender">
        <option value="" selected data-i18n="settings.report.gender_none">Prefer not to say</option>
        <option value="f" data-i18n="settings.report.gender_f">Female</option>
        <option value="m" data-i18n="settings.report.gender_m">Male</option>
        <option value="x" data-i18n="settings.report.gender_x">Non-binary</option>
      </select>
    </div>

    <div class="field row">
      <label for="report_height" data-i18n="settings.report.height">Height (cm)</label>
      <input id="report_height" type="number" min="50" max="250" />
      <p><small data-i18n="settings.report.height_hint"></small></p>
    </div>

    <div class="field row">
      <label for="report_device" data-i18n="settings.report.device">Device</label>
      <select id="report_device"></select>
    </div>

    <div class="field row">
      <label for="report_days" data-i18n="settings.report.period">Period</label>
      <select id="report_days">
        <option value="14">14</option>
        <option value="30" selected>30</option>
        <option value="60">60</option>
        <option value="90">90</option>
      </select>
    </div>

    <button id="report_generate" class="hy-nostyle" data-i18n="settings.report.generate">Generate report</button>
    <p><small id="report_status"></small></p>
    <p><small data-i18n="settings.report.hint"></small></p>
  </fieldset>

  <div id="report_output"></div>

  <script type="text/javascript">
    function onHomeyReady(Homey) {
      var clientIdEl = document.getElementById('client_id');
      var clientSecretEl = document.getElementById('client_secret');
      var enableWriteEl = document.getElementById('enable_write');
      var enableCardiacEl = document.getElementById('enable_cardiac');
      var saveEl = document.getElementById('save');

      Homey.get('client_id', function (err, value) {
        if (!err && value) clientIdEl.value = value;
      });
      Homey.get('client_secret', function (err, value) {
        if (!err && value) clientSecretEl.value = value;
      });
      Homey.get('enable_write', function (err, value) {
        if (!err) enableWriteEl.checked = !!value;
      });
      Homey.get('enable_cardiac', function (err, value) {
        if (!err) enableCardiacEl.checked = !!value;
      });

      saveEl.addEventListener('click', function () {
        var values = [
          ['client_id', clientIdEl.value.trim()],
          ['client_secret', clientSecretEl.value.trim()],
          ['enable_write', enableWriteEl.checked],
          ['enable_cardiac', enableCardiacEl.checked],
        ];
        var index = 0;
        (function next(err) {
          if (err) return Homey.alert(err.message || String(err));
          if (index >= values.length) return Homey.alert(Homey.__('settings.saved'));
          var pair = values[index++];
          Homey.set(pair[0], pair[1], next);
        })();
      });

      // ── Health report ────────────────────────────────────────────
      var reportDeviceEl = document.getElementById('report_device');
      var reportDaysEl = document.getElementById('report_days');
      var reportBtn = document.getElementById('report_generate');
      var reportStatus = document.getElementById('report_status');

      // Patient details: persisted app settings, prefilled on load
      var patientFields = [
        ['report_name', document.getElementById('report_name')],
        ['report_birthdate', document.getElementById('report_birthdate')],
        ['report_gender', document.getElementById('report_gender')],
        ['report_height', document.getElementById('report_height')],
      ];
      patientFields.forEach(function (f) {
        Homey.get(f[0], function (err, value) {
          if (!err && value !== null && value !== undefined) f[1].value = value;
        });
      });

      Homey.api('GET', '/devices', function (err, devices) {
        if (err || !devices || !devices.length) {
          reportBtn.disabled = true;
          reportStatus.textContent = Homey.__('settings.report.no_device');
          return;
        }
        devices.forEach(function (d) {
          var opt = document.createElement('option');
          opt.value = d.id;
          opt.textContent = d.name;
          reportDeviceEl.appendChild(opt);
        });
      });

      reportBtn.addEventListener('click', function () {
        reportBtn.disabled = true;
        reportStatus.textContent = Homey.__('settings.report.generating');

        // Remember the patient details for the next report
        patientFields.forEach(function (f) {
          Homey.set(f[0], f[1].value, function () {});
        });

        var url = '/report?days=' + reportDaysEl.value
          + '&device=' + encodeURIComponent(reportDeviceEl.value);
        Homey.api('GET', url, function (err, report) {
          reportBtn.disabled = false;
          if (err) {
            reportStatus.textContent = String(err.message || err);
            return;
          }
          reportStatus.textContent = '';
          openReport(report);
        });
      });

      function fmt(value, digits) {
        if (value === null || value === undefined) return '–';
        return Number(value).toFixed(digits === undefined ? 0 : digits);
      }

      function mean(entries, key) {
        var vals = (entries || []).map(function (e) { return key ? e[key] : e.value; })
          .filter(function (v) { return typeof v === 'number'; });
        if (!vals.length) return null;
        return vals.reduce(function (a, b) { return a + b; }, 0) / vals.length;
      }

      // Design tokens (dataviz reference palette): dark on screen, light in
      // print — series colors validated for both surfaces.
      var RPT_CSS = ''
        + '.rpt{--surface:#1a1a19;--page:#0d0d0d;--ink:#fff;--ink2:#c3c2b7;--muted:#898781;'
        + '--grid:#2c2c2a;--border:rgba(255,255,255,.10);'
        + '--c-steps:#3987e5;--c-rhr:#e66767;--c-sleep:#9085e9;--c-weight:#199e70;'
        + 'font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);'
        + 'background:var(--page);max-width:880px;margin:0 auto;padding:28px 24px 40px;'
        + '-webkit-print-color-adjust:exact;print-color-adjust:exact}'
        + '@media print{.rpt{--surface:#fcfcfb;--page:#fff;--ink:#0b0b0b;--ink2:#52514e;'
        + '--grid:#e1e0d9;--border:rgba(11,11,11,.10);'
        + '--c-steps:#2a78d6;--c-rhr:#e34948;--c-sleep:#4a3aa7;--c-weight:#1baf7a;'
        + 'max-width:none;padding:0}.rpt .noprint{display:none}.rpt .tablewrap{overflow:visible}'
        + '.rpt table{font-size:8.5px;table-layout:fixed;width:100%}'
        + '.rpt th{white-space:normal;word-break:break-word;vertical-align:bottom}'
        + '.rpt td{white-space:nowrap;overflow:hidden}'
        + '.rpt th,.rpt td{padding:2px 3px}@page{margin:10mm}}'
        + '.rpt h1{font-size:22px;font-weight:650;margin:0;display:flex;align-items:center;gap:10px}'
        + '.rpt h1 svg{flex:none}'
        + '.rpt .meta{font-size:12px;color:var(--ink2);margin-top:4px}'
        + '.rpt .btns{display:flex;gap:8px;margin:18px 0 4px;flex-wrap:wrap}'
        + '.rpt .btns button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);'
        + 'background:var(--surface);color:var(--ink);font:inherit;font-size:13px;cursor:pointer}'
        + '.rpt .access{font-size:12px;color:var(--ink2);margin:4px 0 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}'
        + '.rpt .access .pw{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;'
        + 'font-weight:600;letter-spacing:.06em;color:var(--ink);background:var(--surface);'
        + 'border:1px solid var(--border);border-radius:6px;padding:2px 8px;user-select:all}'
        + '.rpt .access .pwcopy{font:inherit;font-size:11px;padding:3px 10px;border-radius:6px;'
        + 'border:1px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer}'
        + '.rpt .access .pwcopy.ok{color:var(--c-weight);border-color:var(--c-weight)}'
        + '.rpt .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:20px 0 14px}'
        + '.rpt .tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}'
        + '.rpt .tile .k{font-size:10.5px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}'
        + '.rpt .tile .v{font-size:22px;font-weight:650;margin-top:4px}'
        + '.rpt .tile .s{font-size:10.5px;color:var(--ink2);margin-top:2px}'
        + '.rpt .patient{font-size:13px;color:var(--ink2);margin-top:12px;padding:10px 14px;'
        + 'background:var(--surface);border:1px solid var(--border);border-radius:12px}'
        + '.rpt .patient b{color:var(--ink);font-weight:600}'
        + '.rpt .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}'
        + '.rpt .chart{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px 8px}'
        + '.rpt .chart .t{font-size:12.5px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}'
        + '.rpt .chart .last{color:var(--ink2);font-weight:500;font-size:11.5px;white-space:nowrap}'
        + '.rpt .chart .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:baseline}'
        + '.rpt .chart svg{width:100%;height:auto;display:block}'
        + '.rpt h2{font-size:14px;font-weight:650;margin:24px 0 8px}'
        + '.rpt .tablewrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow-x:auto}'
        + '.rpt table{border-collapse:collapse;width:100%;font-size:10.5px;font-variant-numeric:tabular-nums}'
        + '.rpt th,.rpt td{padding:5px 9px;text-align:right;border-bottom:1px solid var(--grid);white-space:nowrap}'
        + '.rpt th{color:var(--muted);font-weight:600;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em}'
        + '.rpt th:first-child,.rpt td:first-child{text-align:left}'
        + '.rpt tbody tr:last-child td{border-bottom:none}'
        + '.rpt td.empty{color:var(--muted)}'
        + '.rpt .disclaimer{font-size:10px;color:var(--muted);margin-top:14px;line-height:1.5}'
        + '.rpt .customizer{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:16px 0 4px}'
        + '.rpt .customizer .ct{font-size:12.5px;font-weight:650}'
        + '.rpt .customizer .ch{font-size:11px;color:var(--muted);margin-top:2px}'
        + '.rpt .customizer .grp{margin-top:12px}'
        + '.rpt .customizer .gl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:8px}'
        + '.rpt .customizer .gl button{font:inherit;font-size:10px;padding:1px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--ink2);cursor:pointer}'
        + '.rpt .customizer .opts{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px 14px}'
        + '.rpt .customizer label{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink);cursor:pointer}'
        + '.rpt .customizer input{accent-color:var(--c-steps);width:15px;height:15px;flex:none;margin:0}'
        + '@media screen{.rpt thead th{position:sticky;top:0;background:var(--surface)}}';

      var RPT_MARK = '<svg width="22" height="22" viewBox="0 0 512 512" aria-hidden="true">'
        + '<path fill-rule="evenodd" fill="#DE3226" d="M256 450.6 C112.6 337.9 41 250.9 41 166.4 '
        + 'C41 94.7 94.7 41 163.8 41 C204.8 41 240.6 62.5 256 97.3 C271.4 62.5 307.2 41 348.2 41 '
        + 'C417.3 41 471 94.7 471 166.4 C471 250.9 399.4 337.9 256 450.6 Z '
        + 'M74 240 L174.1 240 L223.5 141.2 L263.2 269.8 L291.6 201.3 L328.8 240 L438 240 L438 272 '
        + 'L315.2 272 L302.4 258.7 L258.8 364.2 L216.5 226.8 L193.9 272 L74 272 Z"/></svg>';

      function lineChart(entries, key, cssVar, digits, unit) {
        var pts = (entries || []).map(function (e) {
          return { date: e.date, value: key ? e[key] : e.value };
        }).filter(function (p) { return typeof p.value === 'number'; });
        if (pts.length < 2) return null;

        var W = 560; var H = 170;
        var padL = 44; var padR = 12; var padT = 12; var padB = 24;
        var vals = pts.map(function (p) { return p.value; });
        var min = Math.min.apply(null, vals);
        var max = Math.max.apply(null, vals);
        if (min === max) { min -= 1; max += 1; }
        var span = max - min;
        min -= span * 0.06; max += span * 0.06;

        var X = function (i) { return padL + (i / (pts.length - 1)) * (W - padL - padR); };
        var Y = function (v) { return padT + (1 - (v - min) / (max - min)) * (H - padT - padB); };

        var line = pts.map(function (p, i) { return X(i).toFixed(1) + ',' + Y(p.value).toFixed(1); }).join(' ');
        var baseY = (H - padB).toFixed(1);
        var area = 'M' + X(0).toFixed(1) + ',' + baseY + ' L' + line.split(' ').join(' L') + ' L' + X(pts.length - 1).toFixed(1) + ',' + baseY + ' Z';

        var grid = '';
        [min + (max - min), min + (max - min) / 2, min].forEach(function (v) {
          var y = Y(v).toFixed(1);
          grid += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="var(--grid)" stroke-width="1"/>'
            + '<text x="' + (padL - 6) + '" y="' + (Number(y) + 3) + '" text-anchor="end" font-size="9" fill="var(--muted)">' + fmt(v, digits) + '</text>';
        });

        var hover = pts.map(function (p, i) {
          return '<circle cx="' + X(i).toFixed(1) + '" cy="' + Y(p.value).toFixed(1) + '" r="9" fill="transparent">'
            + '<title>' + p.date + ' · ' + fmt(p.value, digits) + (unit ? ' ' + unit : '') + '</title></circle>';
        }).join('');

        var lastPt = pts[pts.length - 1];
        return {
          last: fmt(lastPt.value, digits) + (unit ? ' ' + unit : ''),
          svg: '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img">'
            + grid
            + '<path d="' + area + '" fill="var(' + cssVar + ')" opacity="0.12"/>'
            + '<polyline points="' + line + '" fill="none" stroke="var(' + cssVar + ')" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
            + '<circle cx="' + X(pts.length - 1).toFixed(1) + '" cy="' + Y(lastPt.value).toFixed(1) + '" r="3.5" fill="var(' + cssVar + ')"/>'
            + '<text x="' + padL + '" y="' + (H - 8) + '" font-size="9" fill="var(--muted)">' + pts[0].date + '</text>'
            + '<text x="' + (W - padR) + '" y="' + (H - 8) + '" text-anchor="end" font-size="9" fill="var(--muted)">' + lastPt.date + '</text>'
            + hover
            + '</svg>',
        };
      }

      // Self-contained (no closure refs): its source is also stringified via
      // .toString() and embedded into the standalone served page, so it must
      // rely only on its `doc` argument, the DOM and localStorage.
      function wireCustomizer(doc) {
        var KEY = 'ghhealthreport.hidden.v1';
        var hidden = {};
        try { hidden = JSON.parse(localStorage.getItem(KEY) || '{}') || {}; } catch (e) { hidden = {}; }
        function save() { try { localStorage.setItem(KEY, JSON.stringify(hidden)); } catch (e) {} }
        function applySec(id, on) {
          var el = doc.querySelector('[data-sec="' + id + '"]');
          if (el) el.style.display = on ? '' : 'none';
        }
        function applyCol(key, on) {
          var els = doc.querySelectorAll('.col-' + key);
          for (var i = 0; i < els.length; i++) els[i].style.display = on ? '' : 'none';
        }
        function bind(attr, apply) {
          var boxes = doc.querySelectorAll('[data-cz-' + attr + ']');
          for (var i = 0; i < boxes.length; i++) {
            (function (box) {
              var id = box.getAttribute('data-cz-' + attr);
              var storeKey = attr + ':' + id;
              var on = hidden[storeKey] !== true;
              box.checked = on;
              apply(id, on);
              box.onchange = function () {
                hidden[storeKey] = !box.checked;
                apply(id, box.checked);
                save();
              };
            })(boxes[i]);
          }
        }
        bind('sec', applySec);
        bind('col', applyCol);
        var btns = doc.querySelectorAll('[data-cz-all]');
        for (var k = 0; k < btns.length; k++) {
          (function (btn) {
            btn.onclick = function () {
              var grp = btn.getAttribute('data-cz-all');
              var val = btn.getAttribute('data-cz-val') === '1';
              var boxes = doc.querySelectorAll('[data-cz-' + grp + ']');
              for (var m = 0; m < boxes.length; m++) {
                boxes[m].checked = val;
                boxes[m].onchange();
              }
            };
          })(btns[k]);
        }
      }

      function openReport(report) {
        var T = function (k) { return Homey.__('settings.report.' + k); };
        var s = report.series || {};
        var byDate = {};
        function put(entries, col, key) {
          (entries || []).forEach(function (e) {
            if (!byDate[e.date]) byDate[e.date] = {};
            byDate[e.date][col] = key ? e[key] : e.value;
          });
        }
        put(s.steps, 'steps'); put(s.distance_km, 'km');
        put(s.active_zone_minutes, 'azm');
        put(s.resting_heart_rate, 'rhr'); put(s.hrv_ms, 'hrv');
        put(s.spo2_pct, 'spo2'); put(s.respiratory_rate, 'resp');
        put(s.sleep, 'sleep', 'hours'); put(s.sleep, 'deep', 'deepMinutes');
        put(s.weight_kg, 'weight');
        put(s.calorie_intake, 'kcal_in');
        put(s.glucose_mgdl, 'glucose');
        put(s.body_temperature, 'temp');

        var dates = Object.keys(byDate).sort();
        var allCols = [
          ['steps', T('col_steps'), 0], ['km', 'km', 2],
          ['azm', T('col_azm'), 0],
          ['rhr', T('col_rhr'), 0], ['hrv', 'HRV', 0], ['spo2', 'SpO2', 0],
          ['resp', T('col_resp'), 1], ['sleep', T('col_sleep'), 1],
          ['deep', T('col_deep'), 0], ['weight', T('col_weight'), 1],
          ['kcal_in', T('col_kcal_in'), 0], ['glucose', T('col_glucose'), 0],
          ['temp', T('col_temp'), 1],
        ];
        // Only keep columns that actually have data, so the table never gets
        // wider than the metrics the user really has (keeps it printable)
        var cols = allCols.filter(function (c) {
          return dates.some(function (d) { return typeof byDate[d][c[0]] === 'number'; });
        });

        var rows = dates.map(function (d) {
          return '<tr><td>' + d + '</td>' + cols.map(function (c) {
            var v = byDate[d][c[0]];
            return typeof v === 'number'
              ? '<td class="col-' + c[0] + '">' + fmt(v, c[2]) + '</td>'
              : '<td class="col-' + c[0] + ' empty">–</td>';
          }).join('') + '</tr>';
        }).join('');

        var weightDelta = null;
        if (s.weight_kg && s.weight_kg.length >= 2) {
          weightDelta = s.weight_kg[s.weight_kg.length - 1].value - s.weight_kg[0].value;
        }

        // Patient details + BMI (latest weight and height, field overrides API)
        function esc(text) {
          return String(text).replace(/[<>&"]/g, function (ch) {
            return { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[ch];
          });
        }
        var pName = (document.getElementById('report_name') || {}).value || '';
        var pBirth = (document.getElementById('report_birthdate') || {}).value || '';
        var pGender = (document.getElementById('report_gender') || {}).value || '';
        var heightCm = Number((document.getElementById('report_height') || {}).value)
          || Number(s.height_cm) || 0;

        var age = null;
        if (pBirth) {
          var birth = new Date(pBirth + 'T00:00:00');
          if (!isNaN(birth)) {
            var now = new Date();
            age = now.getFullYear() - birth.getFullYear();
            if (now.getMonth() < birth.getMonth()
              || (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
          }
        }

        var lastWeight = (s.weight_kg && s.weight_kg.length)
          ? s.weight_kg[s.weight_kg.length - 1].value : null;
        var bmi = null;
        if (typeof lastWeight === 'number' && heightCm >= 50) {
          bmi = lastWeight / Math.pow(heightCm / 100, 2);
        }
        function bmiCategory(v) {
          if (v < 18.5) return T('bmi_under');
          if (v < 25) return T('bmi_normal');
          if (v < 30) return T('bmi_over');
          return T('bmi_obese');
        }

        var patientParts = [];
        if (pName) patientParts.push('<b>' + esc(pName) + '</b>');
        if (pBirth) patientParts.push(T('born') + ' ' + esc(pBirth) + (age !== null ? ' (' + age + ' ' + T('years') + ')' : ''));
        if (pGender) patientParts.push(T('gender_' + pGender));
        if (heightCm) patientParts.push(heightCm + ' cm');
        var patientBlock = patientParts.length
          ? '<div class="patient" data-sec="patient">' + patientParts.join(' &nbsp;·&nbsp; ') + '</div>' : '';

        var tileData = [
          [T('avg_steps'), fmt(mean(s.steps), 0)],
          [T('avg_sleep'), fmt(mean(s.sleep, 'hours'), 1) + ' h'],
          [T('avg_rhr'), fmt(mean(s.resting_heart_rate), 0) + ' bpm'],
          [T('avg_spo2'), fmt(mean(s.spo2_pct), 0) + ' %'],
          [T('weight_change'), (weightDelta === null ? '–' : (weightDelta > 0 ? '+' : '') + fmt(weightDelta, 1) + ' kg')],
        ];
        if (bmi !== null) tileData.push(['BMI', fmt(bmi, 1), bmiCategory(bmi)]);
        var tiles = tileData.map(function (c) {
          return '<div class="tile"><div class="k">' + c[0] + '</div><div class="v">' + c[1] + '</div>'
            + (c[2] ? '<div class="s">' + c[2] + '</div>' : '') + '</div>';
        }).join('');

        var chartDefs = [
          ['chart_steps', T('col_steps'), lineChart(s.steps, null, '--c-steps', 0, ''), '--c-steps'],
          ['chart_rhr', T('col_rhr'), lineChart(s.resting_heart_rate, null, '--c-rhr', 0, 'bpm'), '--c-rhr'],
          ['chart_sleep', T('col_sleep'), lineChart(s.sleep, 'hours', '--c-sleep', 1, 'h'), '--c-sleep'],
          ['chart_weight', T('col_weight'), lineChart(s.weight_kg, null, '--c-weight', 1, 'kg'), '--c-weight'],
        ].filter(function (c) { return c[2]; });
        var charts = chartDefs.map(function (c) {
          return '<div class="chart" data-sec="' + c[0] + '"><div class="t"><span>' + c[1] + '</span>'
            + '<span class="last"><span class="dot" style="background:var(' + c[3] + ')"></span>' + c[2].last + '</span></div>'
            + c[2].svg + '</div>';
        }).join('');

        // Build the on-page customizer from the blocks/columns that actually
        // exist, so users never see a toggle for data they don't have.
        var secDefs = [];
        if (patientBlock) secDefs.push(['patient', T('sec_patient')]);
        secDefs.push(['summary', T('sec_summary')]);
        chartDefs.forEach(function (c) { secDefs.push([c[0], c[1]]); });
        if (rows) secDefs.push(['table', T('daily_values')]);
        secDefs.push(['disclaimer', T('sec_disclaimer')]);

        function czGroup(label, attr, defs) {
          if (!defs.length) return '';
          return '<div class="grp"><div class="gl">' + label
            + '<button data-cz-all="' + attr + '" data-cz-val="1">' + T('select_all') + '</button>'
            + '<button data-cz-all="' + attr + '" data-cz-val="0">' + T('select_none') + '</button></div>'
            + '<div class="opts">' + defs.map(function (d) {
              return '<label><input type="checkbox" data-cz-' + attr + '="' + d[0] + '" checked><span>' + d[1] + '</span></label>';
            }).join('') + '</div></div>';
        }
        var customizer = '<div class="customizer noprint">'
          + '<div class="ct">' + T('customize') + '</div>'
          + '<div class="ch">' + T('customize_hint') + '</div>'
          + czGroup(T('sec_sections'), 'sec', secDefs)
          + czGroup(T('sec_columns'), 'col', cols.map(function (c) { return [c[0], c[1]]; }))
          + '</div>';

        var inner = '<h1>' + RPT_MARK + T('title') + '</h1>'
          + '<div class="meta">' + report.meta.deviceName + ' · '
          + report.meta.from + ' – ' + report.meta.to + ' (' + report.meta.days + ' ' + T('days') + ') · '
          + T('generated') + ' ' + new Date(report.meta.generatedAt).toLocaleString() + '</div>'
          + customizer
          + patientBlock
          + '<div class="tiles" data-sec="summary">' + tiles + '</div>'
          + '<div class="charts">' + charts + '</div>'
          + '<div data-sec="table"><h2>' + T('daily_values') + '</h2>'
          + '<div class="tablewrap"><table><thead><tr><th>' + T('col_date') + '</th>'
          + cols.map(function (c) { return '<th class="col-' + c[0] + '">' + c[1] + '</th>'; }).join('')
          + '</tr></thead><tbody>' + rows + '</tbody></table></div></div>'
          + '<p class="disclaimer" data-sec="disclaimer">' + T('disclaimer') + '</p>';

        var fullDoc = '<!doctype html><html><head><meta charset="utf-8">'
          + '<meta name="viewport" content="width=device-width,initial-scale=1">'
          + '<title>' + T('title') + '</title>'
          + '<style>body{margin:0;background:#0d0d0d}@media print{body{background:#fff}}' + RPT_CSS + '</style></head>'
          + '<body><div class="rpt">'
          + '<div class="btns noprint"><button onclick="window.print()">' + T('print') + '</button></div>'
          + inner + '</div>'
          + '<script>(' + wireCustomizer.toString() + ')(document);</scr' + 'ipt>'
          + '</body></html>';

        // Render the report on this page, then publish it on the LAN so it can
        // be opened in a real browser for printing / PDF. This inline path
        // works identically on desktop and in the mobile app; the old
        // window.open popup path was unreliable in the mobile app's webview
        // (it returned a non-null but invisible window, swallowing the report).
        var container = document.getElementById('report_output');
        container.innerHTML = '<style>' + RPT_CSS
          + '#report_output .rpt{border:1px solid var(--border);border-radius:12px;margin-top:12px;padding:20px 18px 28px}'
          + '@media print{#report_output .rpt{border:none;margin:0;padding:0}}</style>'
          + '<div class="rpt">'
          + '<div class="btns noprint">'
          + '<button id="report_open">' + T('open_browser') + '</button>'
          + '<button onclick="window.print()">' + T('print') + '</button>'
          + '</div>'
          + '<div id="report_access" class="access noprint"></div>'
          + inner + '</div>';

        // Make the inline preview's customizer interactive too (the standalone
        // served page wires itself via the embedded script instead).
        wireCustomizer(document);

        var openBtnEl = document.getElementById('report_open');
        openBtnEl.disabled = true;

        // The sandboxed settings iframe blocks window.open, print and
        // downloads. Publish the report on the Homey's LAN address instead
        // and open it via Homey.openURL — that runs outside the sandbox.
        Homey.api('POST', '/report/publish', { html: fullDoc }, function (err, res) {
          if (err || !res || !res.url) {
            openBtnEl.style.display = 'none';
            reportStatus.textContent = err ? String(err.message || err) : '';
            return;
          }
          openBtnEl.disabled = false;
          openBtnEl.addEventListener('click', function () {
            Homey.openURL(res.url);
          });
          // Render the password as a one-click-copyable chip (typing it into
          // the browser's auth dialog by hand is annoying)
          var accessEl = document.getElementById('report_access');
          var parts = T('access_info')
            .replace('__minutes__', String(res.ttlMinutes || 5))
            .split('__password__');
          accessEl.innerHTML = esc(parts[0])
            + '<code class="pw" id="report_pw">' + esc(res.password) + '</code>'
            + '<button type="button" class="pwcopy" id="report_pw_copy">' + esc(T('copy')) + '</button>'
            + esc(parts[1] || '');
          var copyBtn = document.getElementById('report_pw_copy');
          copyBtn.addEventListener('click', function () {
            function flash() {
              copyBtn.textContent = T('copied');
              copyBtn.classList.add('ok');
              setTimeout(function () { copyBtn.textContent = T('copy'); copyBtn.classList.remove('ok'); }, 1500);
            }
            function selectFallback() {
              try {
                var range = document.createRange();
                range.selectNodeContents(document.getElementById('report_pw'));
                var sel = window.getSelection();
                sel.removeAllRanges(); sel.addRange(range);
                document.execCommand('copy');
                sel.removeAllRanges();
                flash();
              } catch (e) { /* clipboard unavailable in this context */ }
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(res.password).then(flash, selectFallback);
            } else {
              selectFallback();
            }
          });
        });

        reportStatus.textContent = Homey.__('settings.report.inline_ready');
        container.scrollIntoView({ behavior: 'smooth' });
      }

      Homey.ready();
    }
  </script>
</body>
</html>
