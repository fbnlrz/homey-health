<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    .redirect-uri {
      display: block;
      padding: 6px 8px;
      margin: 6px 0 12px;
      background: #f0f0f0;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      user-select: all;
    }
    ol li { margin-bottom: 8px; }
    .hy-nostyle { margin-top: 16px; }
    #report_output .report-sheet {
      background: #fff; color: #222; padding: 16px;
      border-radius: 8px; margin-top: 12px; overflow-x: auto;
    }
    @media print {
      body * { visibility: hidden; }
      #report_output, #report_output * { visibility: visible; }
      #report_output { position: absolute; left: 0; top: 0; width: 100%; }
      #report_output .noprint { display: none; }
    }
  </style>
</head>
<body>
  <h1 data-i18n="settings.title">Google Health</h1>
  <p data-i18n="settings.intro"></p>

  <ol>
    <li>
      <span data-i18n="settings.step1"></span>
      <a href="https://console.cloud.google.com/" target="_blank" rel="noopener">console.cloud.google.com</a>
    </li>
    <li>
      <span data-i18n="settings.step2"></span>
      <a href="https://console.cloud.google.com/apis/api/health.googleapis.com" target="_blank" rel="noopener">health.googleapis.com</a>
    </li>
    <li>
      <span data-i18n="settings.step3"></span>
      <code class="redirect-uri">https://callback.athom.com/oauth2/callback</code>
    </li>
    <li><span data-i18n="settings.step4"></span></li>
    <li><span data-i18n="settings.step5"></span></li>
  </ol>

  <fieldset>
    <legend data-i18n="settings.title"></legend>

    <div class="field row">
      <label for="client_id" data-i18n="settings.client_id">Client ID</label>
      <input id="client_id" type="text" value="" autocomplete="off" />
    </div>

    <div class="field row">
      <label for="client_secret" data-i18n="settings.client_secret">Client Secret</label>
      <input id="client_secret" type="password" value="" autocomplete="off" />
    </div>

    <div class="field row">
      <label>
        <input id="enable_write" type="checkbox" />
        <span data-i18n="settings.enable_write"></span>
      </label>
      <p><small data-i18n="settings.enable_write_hint"></small></p>
    </div>
  </fieldset>

  <button id="save" class="hy-nostyle" data-i18n="settings.save">Save</button>

  <hr style="margin:24px 0" />

  <fieldset>
    <legend data-i18n="settings.report.title">Health report</legend>
    <p data-i18n="settings.report.intro"></p>

    <div class="field row">
      <label for="report_device" data-i18n="settings.report.device">Device</label>
      <select id="report_device"></select>
    </div>

    <div class="field row">
      <label for="report_days" data-i18n="settings.report.period">Period</label>
      <select id="report_days">
        <option value="14">14</option>
        <option value="30" selected>30</option>
        <option value="60">60</option>
        <option value="90">90</option>
      </select>
    </div>

    <button id="report_generate" class="hy-nostyle" data-i18n="settings.report.generate">Generate report</button>
    <p><small id="report_status"></small></p>
    <p><small data-i18n="settings.report.hint"></small></p>
  </fieldset>

  <div id="report_output"></div>

  <script type="text/javascript">
    function onHomeyReady(Homey) {
      var clientIdEl = document.getElementById('client_id');
      var clientSecretEl = document.getElementById('client_secret');
      var enableWriteEl = document.getElementById('enable_write');
      var saveEl = document.getElementById('save');

      Homey.get('client_id', function (err, value) {
        if (!err && value) clientIdEl.value = value;
      });
      Homey.get('client_secret', function (err, value) {
        if (!err && value) clientSecretEl.value = value;
      });
      Homey.get('enable_write', function (err, value) {
        if (!err) enableWriteEl.checked = !!value;
      });

      saveEl.addEventListener('click', function () {
        var values = [
          ['client_id', clientIdEl.value.trim()],
          ['client_secret', clientSecretEl.value.trim()],
          ['enable_write', enableWriteEl.checked],
        ];
        var index = 0;
        (function next(err) {
          if (err) return Homey.alert(err.message || String(err));
          if (index >= values.length) return Homey.alert(Homey.__('settings.saved'));
          var pair = values[index++];
          Homey.set(pair[0], pair[1], next);
        })();
      });

      // ── Health report ────────────────────────────────────────────
      var reportDeviceEl = document.getElementById('report_device');
      var reportDaysEl = document.getElementById('report_days');
      var reportBtn = document.getElementById('report_generate');
      var reportStatus = document.getElementById('report_status');

      Homey.api('GET', '/devices', function (err, devices) {
        if (err || !devices || !devices.length) {
          reportBtn.disabled = true;
          reportStatus.textContent = Homey.__('settings.report.no_device');
          return;
        }
        devices.forEach(function (d) {
          var opt = document.createElement('option');
          opt.value = d.id;
          opt.textContent = d.name;
          reportDeviceEl.appendChild(opt);
        });
      });

      reportBtn.addEventListener('click', function () {
        reportBtn.disabled = true;
        reportStatus.textContent = Homey.__('settings.report.generating');

        // The window must be opened synchronously inside the click gesture —
        // opening it later in the API callback gets blocked as a popup
        var win = null;
        try { win = window.open('', '_blank'); } catch (e) { win = null; }
        if (win) {
          win.document.write('<p style="font-family:sans-serif;margin:24px">'
            + Homey.__('settings.report.generating') + '</p>');
        }

        var url = '/report?days=' + reportDaysEl.value
          + '&device=' + encodeURIComponent(reportDeviceEl.value);
        Homey.api('GET', url, function (err, report) {
          reportBtn.disabled = false;
          if (err) {
            if (win) win.close();
            reportStatus.textContent = String(err.message || err);
            return;
          }
          reportStatus.textContent = '';
          openReport(report, win);
        });
      });

      function fmt(value, digits) {
        if (value === null || value === undefined) return '–';
        return Number(value).toFixed(digits === undefined ? 0 : digits);
      }

      function mean(entries, key) {
        var vals = (entries || []).map(function (e) { return key ? e[key] : e.value; })
          .filter(function (v) { return typeof v === 'number'; });
        if (!vals.length) return null;
        return vals.reduce(function (a, b) { return a + b; }, 0) / vals.length;
      }

      // Design tokens (dataviz reference palette): dark on screen, light in
      // print — series colors validated for both surfaces.
      var RPT_CSS = ''
        + '.rpt{--surface:#1a1a19;--page:#0d0d0d;--ink:#fff;--ink2:#c3c2b7;--muted:#898781;'
        + '--grid:#2c2c2a;--border:rgba(255,255,255,.10);'
        + '--c-steps:#3987e5;--c-rhr:#e66767;--c-sleep:#9085e9;--c-weight:#199e70;'
        + 'font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);'
        + 'background:var(--page);max-width:880px;margin:0 auto;padding:28px 24px 40px;'
        + '-webkit-print-color-adjust:exact;print-color-adjust:exact}'
        + '@media print{.rpt{--surface:#fcfcfb;--page:#fff;--ink:#0b0b0b;--ink2:#52514e;'
        + '--grid:#e1e0d9;--border:rgba(11,11,11,.10);'
        + '--c-steps:#2a78d6;--c-rhr:#e34948;--c-sleep:#4a3aa7;--c-weight:#1baf7a;'
        + 'max-width:none;padding:0}.rpt .noprint{display:none}}'
        + '.rpt h1{font-size:22px;font-weight:650;margin:0;display:flex;align-items:center;gap:10px}'
        + '.rpt h1 svg{flex:none}'
        + '.rpt .meta{font-size:12px;color:var(--ink2);margin-top:4px}'
        + '.rpt .btns{display:flex;gap:8px;margin:18px 0 4px;flex-wrap:wrap}'
        + '.rpt .btns button{padding:8px 16px;border-radius:8px;border:1px solid var(--border);'
        + 'background:var(--surface);color:var(--ink);font:inherit;font-size:13px;cursor:pointer}'
        + '.rpt .access{font-size:12px;color:var(--ink2);margin:4px 0 0}'
        + '.rpt .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:20px 0 14px}'
        + '.rpt .tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}'
        + '.rpt .tile .k{font-size:10.5px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}'
        + '.rpt .tile .v{font-size:22px;font-weight:650;margin-top:4px}'
        + '.rpt .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}'
        + '.rpt .chart{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px 8px}'
        + '.rpt .chart .t{font-size:12.5px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}'
        + '.rpt .chart .last{color:var(--ink2);font-weight:500;font-size:11.5px;white-space:nowrap}'
        + '.rpt .chart .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:baseline}'
        + '.rpt .chart svg{width:100%;height:auto;display:block}'
        + '.rpt h2{font-size:14px;font-weight:650;margin:24px 0 8px}'
        + '.rpt .tablewrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow-x:auto}'
        + '.rpt table{border-collapse:collapse;width:100%;font-size:10.5px;font-variant-numeric:tabular-nums}'
        + '.rpt th,.rpt td{padding:5px 9px;text-align:right;border-bottom:1px solid var(--grid);white-space:nowrap}'
        + '.rpt th{color:var(--muted);font-weight:600;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em}'
        + '.rpt th:first-child,.rpt td:first-child{text-align:left}'
        + '.rpt tbody tr:last-child td{border-bottom:none}'
        + '.rpt td.empty{color:var(--muted)}'
        + '.rpt .disclaimer{font-size:10px;color:var(--muted);margin-top:14px;line-height:1.5}'
        + '@media screen{.rpt thead th{position:sticky;top:0;background:var(--surface)}}';

      var RPT_MARK = '<svg width="22" height="22" viewBox="0 0 512 512" aria-hidden="true">'
        + '<path fill-rule="evenodd" fill="#DE3226" d="M256 450.6 C112.6 337.9 41 250.9 41 166.4 '
        + 'C41 94.7 94.7 41 163.8 41 C204.8 41 240.6 62.5 256 97.3 C271.4 62.5 307.2 41 348.2 41 '
        + 'C417.3 41 471 94.7 471 166.4 C471 250.9 399.4 337.9 256 450.6 Z '
        + 'M74 240 L174.1 240 L223.5 141.2 L263.2 269.8 L291.6 201.3 L328.8 240 L438 240 L438 272 '
        + 'L315.2 272 L302.4 258.7 L258.8 364.2 L216.5 226.8 L193.9 272 L74 272 Z"/></svg>';

      function lineChart(entries, key, cssVar, digits, unit) {
        var pts = (entries || []).map(function (e) {
          return { date: e.date, value: key ? e[key] : e.value };
        }).filter(function (p) { return typeof p.value === 'number'; });
        if (pts.length < 2) return null;

        var W = 560; var H = 170;
        var padL = 44; var padR = 12; var padT = 12; var padB = 24;
        var vals = pts.map(function (p) { return p.value; });
        var min = Math.min.apply(null, vals);
        var max = Math.max.apply(null, vals);
        if (min === max) { min -= 1; max += 1; }
        var span = max - min;
        min -= span * 0.06; max += span * 0.06;

        var X = function (i) { return padL + (i / (pts.length - 1)) * (W - padL - padR); };
        var Y = function (v) { return padT + (1 - (v - min) / (max - min)) * (H - padT - padB); };

        var line = pts.map(function (p, i) { return X(i).toFixed(1) + ',' + Y(p.value).toFixed(1); }).join(' ');
        var baseY = (H - padB).toFixed(1);
        var area = 'M' + X(0).toFixed(1) + ',' + baseY + ' L' + line.split(' ').join(' L') + ' L' + X(pts.length - 1).toFixed(1) + ',' + baseY + ' Z';

        var grid = '';
        [min + (max - min), min + (max - min) / 2, min].forEach(function (v) {
          var y = Y(v).toFixed(1);
          grid += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="var(--grid)" stroke-width="1"/>'
            + '<text x="' + (padL - 6) + '" y="' + (Number(y) + 3) + '" text-anchor="end" font-size="9" fill="var(--muted)">' + fmt(v, digits) + '</text>';
        });

        var hover = pts.map(function (p, i) {
          return '<circle cx="' + X(i).toFixed(1) + '" cy="' + Y(p.value).toFixed(1) + '" r="9" fill="transparent">'
            + '<title>' + p.date + ' · ' + fmt(p.value, digits) + (unit ? ' ' + unit : '') + '</title></circle>';
        }).join('');

        var lastPt = pts[pts.length - 1];
        return {
          last: fmt(lastPt.value, digits) + (unit ? ' ' + unit : ''),
          svg: '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img">'
            + grid
            + '<path d="' + area + '" fill="var(' + cssVar + ')" opacity="0.12"/>'
            + '<polyline points="' + line + '" fill="none" stroke="var(' + cssVar + ')" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
            + '<circle cx="' + X(pts.length - 1).toFixed(1) + '" cy="' + Y(lastPt.value).toFixed(1) + '" r="3.5" fill="var(' + cssVar + ')"/>'
            + '<text x="' + padL + '" y="' + (H - 8) + '" font-size="9" fill="var(--muted)">' + pts[0].date + '</text>'
            + '<text x="' + (W - padR) + '" y="' + (H - 8) + '" text-anchor="end" font-size="9" fill="var(--muted)">' + lastPt.date + '</text>'
            + hover
            + '</svg>',
        };
      }

      function openReport(report, win) {
        var T = function (k) { return Homey.__('settings.report.' + k); };
        var s = report.series || {};
        var byDate = {};
        function put(entries, col, key) {
          (entries || []).forEach(function (e) {
            if (!byDate[e.date]) byDate[e.date] = {};
            byDate[e.date][col] = key ? e[key] : e.value;
          });
        }
        put(s.steps, 'steps'); put(s.distance_km, 'km'); put(s.floors, 'floors');
        put(s.active_zone_minutes, 'azm'); put(s.hydration_ml, 'water');
        put(s.resting_heart_rate, 'rhr'); put(s.hrv_ms, 'hrv');
        put(s.spo2_pct, 'spo2'); put(s.respiratory_rate, 'resp');
        put(s.sleep, 'sleep', 'hours'); put(s.sleep, 'deep', 'deepMinutes');
        put(s.weight_kg, 'weight');

        var dates = Object.keys(byDate).sort();
        var cols = [
          ['steps', T('col_steps'), 0], ['km', 'km', 2], ['floors', T('col_floors'), 0],
          ['azm', T('col_azm'), 0], ['water', T('col_water'), 0],
          ['rhr', T('col_rhr'), 0], ['hrv', 'HRV ms', 0], ['spo2', 'SpO2 %', 0],
          ['resp', T('col_resp'), 1], ['sleep', T('col_sleep'), 1],
          ['deep', T('col_deep'), 0], ['weight', T('col_weight'), 1],
        ];

        var rows = dates.map(function (d) {
          return '<tr><td>' + d + '</td>' + cols.map(function (c) {
            var v = byDate[d][c[0]];
            return typeof v === 'number'
              ? '<td>' + fmt(v, c[2]) + '</td>'
              : '<td class="empty">–</td>';
          }).join('') + '</tr>';
        }).join('');

        var weightDelta = null;
        if (s.weight_kg && s.weight_kg.length >= 2) {
          weightDelta = s.weight_kg[s.weight_kg.length - 1].value - s.weight_kg[0].value;
        }
        var tiles = [
          [T('avg_steps'), fmt(mean(s.steps), 0)],
          [T('avg_sleep'), fmt(mean(s.sleep, 'hours'), 1) + ' h'],
          [T('avg_rhr'), fmt(mean(s.resting_heart_rate), 0) + ' bpm'],
          [T('avg_spo2'), fmt(mean(s.spo2_pct), 0) + ' %'],
          [T('weight_change'), (weightDelta === null ? '–' : (weightDelta > 0 ? '+' : '') + fmt(weightDelta, 1) + ' kg')],
        ].map(function (c) {
          return '<div class="tile"><div class="k">' + c[0] + '</div><div class="v">' + c[1] + '</div></div>';
        }).join('');

        var charts = [
          [T('col_steps'), lineChart(s.steps, null, '--c-steps', 0, ''), '--c-steps'],
          [T('col_rhr'), lineChart(s.resting_heart_rate, null, '--c-rhr', 0, 'bpm'), '--c-rhr'],
          [T('col_sleep'), lineChart(s.sleep, 'hours', '--c-sleep', 1, 'h'), '--c-sleep'],
          [T('col_weight'), lineChart(s.weight_kg, null, '--c-weight', 1, 'kg'), '--c-weight'],
        ].filter(function (c) { return c[1]; }).map(function (c) {
          return '<div class="chart"><div class="t"><span>' + c[0] + '</span>'
            + '<span class="last"><span class="dot" style="background:var(' + c[2] + ')"></span>' + c[1].last + '</span></div>'
            + c[1].svg + '</div>';
        }).join('');

        var inner = '<h1>' + RPT_MARK + T('title') + '</h1>'
          + '<div class="meta">' + report.meta.deviceName + ' · '
          + report.meta.from + ' – ' + report.meta.to + ' (' + report.meta.days + ' ' + T('days') + ') · '
          + T('generated') + ' ' + new Date(report.meta.generatedAt).toLocaleString() + '</div>'
          + '<div class="tiles">' + tiles + '</div>'
          + '<div class="charts">' + charts + '</div>'
          + '<h2>' + T('daily_values') + '</h2>'
          + '<div class="tablewrap"><table><thead><tr><th>' + T('col_date') + '</th>'
          + cols.map(function (c) { return '<th>' + c[1] + '</th>'; }).join('')
          + '</tr></thead><tbody>' + rows + '</tbody></table></div>'
          + '<p class="disclaimer">' + T('disclaimer') + '</p>';

        var fullDoc = '<!doctype html><html><head><meta charset="utf-8">'
          + '<meta name="viewport" content="width=device-width,initial-scale=1">'
          + '<title>' + T('title') + '</title>'
          + '<style>body{margin:0;background:#0d0d0d}@media print{body{background:#fff}}' + RPT_CSS + '</style></head>'
          + '<body><div class="rpt">'
          + '<div class="btns noprint"><button onclick="window.print()">' + T('print') + '</button></div>'
          + inner + '</div></body></html>';

        if (win) {
          // A separate tab worked (not available in the sandboxed settings iframe)
          win.document.open();
          win.document.write(fullDoc);
          win.document.close();
          return;
        }

        // Inline fallback: render on this page. Printing uses the @media print
        // rules that hide everything except the report.
        var container = document.getElementById('report_output');
        container.innerHTML = '<style>' + RPT_CSS
          + '#report_output .rpt{border:1px solid var(--border);border-radius:12px;margin-top:12px;padding:20px 18px 28px}'
          + '@media print{#report_output .rpt{border:none;margin:0;padding:0}}</style>'
          + '<div class="rpt">'
          + '<div class="btns noprint">'
          + '<button id="report_open">' + T('open_browser') + '</button>'
          + '<button onclick="window.print()">' + T('print') + '</button>'
          + '</div>'
          + '<div id="report_access" class="access noprint"></div>'
          + inner + '</div>';

        var openBtnEl = document.getElementById('report_open');
        openBtnEl.disabled = true;

        // The sandboxed settings iframe blocks window.open, print and
        // downloads. Publish the report on the Homey's LAN address instead
        // and open it via Homey.openURL — that runs outside the sandbox.
        Homey.api('POST', '/report/publish', { html: fullDoc }, function (err, res) {
          if (err || !res || !res.url) {
            openBtnEl.style.display = 'none';
            reportStatus.textContent = err ? String(err.message || err) : '';
            return;
          }
          openBtnEl.disabled = false;
          openBtnEl.addEventListener('click', function () {
            Homey.openURL(res.url);
          });
          document.getElementById('report_access').textContent = T('access_info')
            .replace('__password__', res.password)
            .replace('__minutes__', String(res.ttlMinutes || 5));
        });

        reportStatus.textContent = Homey.__('settings.report.inline_ready');
        container.scrollIntoView({ behavior: 'smooth' });
      }

      Homey.ready();
    }
  </script>
</body>
</html>
