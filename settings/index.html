<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    .redirect-uri {
      display: block;
      padding: 6px 8px;
      margin: 6px 0 12px;
      background: #f0f0f0;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      user-select: all;
    }
    ol li { margin-bottom: 8px; }
    .hy-nostyle { margin-top: 16px; }
    #report_output .report-sheet {
      background: #fff; color: #222; padding: 16px;
      border-radius: 8px; margin-top: 12px; overflow-x: auto;
    }
    @media print {
      body * { visibility: hidden; }
      #report_output, #report_output * { visibility: visible; }
      #report_output { position: absolute; left: 0; top: 0; width: 100%; }
      #report_output .noprint { display: none; }
    }
  </style>
</head>
<body>
  <h1 data-i18n="settings.title">Google Health</h1>
  <p data-i18n="settings.intro"></p>

  <ol>
    <li>
      <span data-i18n="settings.step1"></span>
      <a href="https://console.cloud.google.com/" target="_blank" rel="noopener">console.cloud.google.com</a>
    </li>
    <li>
      <span data-i18n="settings.step2"></span>
      <a href="https://console.cloud.google.com/apis/api/health.googleapis.com" target="_blank" rel="noopener">health.googleapis.com</a>
    </li>
    <li>
      <span data-i18n="settings.step3"></span>
      <code class="redirect-uri">https://callback.athom.com/oauth2/callback</code>
    </li>
    <li><span data-i18n="settings.step4"></span></li>
    <li><span data-i18n="settings.step5"></span></li>
  </ol>

  <fieldset>
    <legend data-i18n="settings.title"></legend>

    <div class="field row">
      <label for="client_id" data-i18n="settings.client_id">Client ID</label>
      <input id="client_id" type="text" value="" autocomplete="off" />
    </div>

    <div class="field row">
      <label for="client_secret" data-i18n="settings.client_secret">Client Secret</label>
      <input id="client_secret" type="password" value="" autocomplete="off" />
    </div>

    <div class="field row">
      <label>
        <input id="enable_write" type="checkbox" />
        <span data-i18n="settings.enable_write"></span>
      </label>
      <p><small data-i18n="settings.enable_write_hint"></small></p>
    </div>
  </fieldset>

  <button id="save" class="hy-nostyle" data-i18n="settings.save">Save</button>

  <hr style="margin:24px 0" />

  <fieldset>
    <legend data-i18n="settings.report.title">Health report</legend>
    <p data-i18n="settings.report.intro"></p>

    <div class="field row">
      <label for="report_device" data-i18n="settings.report.device">Device</label>
      <select id="report_device"></select>
    </div>

    <div class="field row">
      <label for="report_days" data-i18n="settings.report.period">Period</label>
      <select id="report_days">
        <option value="14">14</option>
        <option value="30" selected>30</option>
        <option value="60">60</option>
        <option value="90">90</option>
      </select>
    </div>

    <button id="report_generate" class="hy-nostyle" data-i18n="settings.report.generate">Generate report</button>
    <p><small id="report_status"></small></p>
    <p><small data-i18n="settings.report.hint"></small></p>
  </fieldset>

  <div id="report_output"></div>

  <script type="text/javascript">
    function onHomeyReady(Homey) {
      var clientIdEl = document.getElementById('client_id');
      var clientSecretEl = document.getElementById('client_secret');
      var enableWriteEl = document.getElementById('enable_write');
      var saveEl = document.getElementById('save');

      Homey.get('client_id', function (err, value) {
        if (!err && value) clientIdEl.value = value;
      });
      Homey.get('client_secret', function (err, value) {
        if (!err && value) clientSecretEl.value = value;
      });
      Homey.get('enable_write', function (err, value) {
        if (!err) enableWriteEl.checked = !!value;
      });

      saveEl.addEventListener('click', function () {
        var values = [
          ['client_id', clientIdEl.value.trim()],
          ['client_secret', clientSecretEl.value.trim()],
          ['enable_write', enableWriteEl.checked],
        ];
        var index = 0;
        (function next(err) {
          if (err) return Homey.alert(err.message || String(err));
          if (index >= values.length) return Homey.alert(Homey.__('settings.saved'));
          var pair = values[index++];
          Homey.set(pair[0], pair[1], next);
        })();
      });

      // ── Health report ────────────────────────────────────────────
      var reportDeviceEl = document.getElementById('report_device');
      var reportDaysEl = document.getElementById('report_days');
      var reportBtn = document.getElementById('report_generate');
      var reportStatus = document.getElementById('report_status');

      Homey.api('GET', '/devices', function (err, devices) {
        if (err || !devices || !devices.length) {
          reportBtn.disabled = true;
          reportStatus.textContent = Homey.__('settings.report.no_device');
          return;
        }
        devices.forEach(function (d) {
          var opt = document.createElement('option');
          opt.value = d.id;
          opt.textContent = d.name;
          reportDeviceEl.appendChild(opt);
        });
      });

      reportBtn.addEventListener('click', function () {
        reportBtn.disabled = true;
        reportStatus.textContent = Homey.__('settings.report.generating');

        // The window must be opened synchronously inside the click gesture —
        // opening it later in the API callback gets blocked as a popup
        var win = null;
        try { win = window.open('', '_blank'); } catch (e) { win = null; }
        if (win) {
          win.document.write('<p style="font-family:sans-serif;margin:24px">'
            + Homey.__('settings.report.generating') + '</p>');
        }

        var url = '/report?days=' + reportDaysEl.value
          + '&device=' + encodeURIComponent(reportDeviceEl.value);
        Homey.api('GET', url, function (err, report) {
          reportBtn.disabled = false;
          if (err) {
            if (win) win.close();
            reportStatus.textContent = String(err.message || err);
            return;
          }
          reportStatus.textContent = '';
          openReport(report, win);
        });
      });

      function fmt(value, digits) {
        if (value === null || value === undefined) return '–';
        return Number(value).toFixed(digits === undefined ? 0 : digits);
      }

      function mean(entries, key) {
        var vals = entries.map(function (e) { return key ? e[key] : e.value; })
          .filter(function (v) { return typeof v === 'number'; });
        if (!vals.length) return null;
        return vals.reduce(function (a, b) { return a + b; }, 0) / vals.length;
      }

      function sparkline(entries, key, color) {
        var vals = entries.map(function (e) { return key ? e[key] : e.value; })
          .filter(function (v) { return typeof v === 'number'; });
        if (vals.length < 2) return '';
        var min = Math.min.apply(null, vals);
        var max = Math.max.apply(null, vals);
        var range = (max - min) || 1;
        var W = 600; var H = 80; var P = 4;
        var pts = vals.map(function (v, i) {
          var x = P + (i / (vals.length - 1)) * (W - 2 * P);
          var y = H - P - ((v - min) / range) * (H - 2 * P);
          return x.toFixed(1) + ',' + y.toFixed(1);
        }).join(' ');
        return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:56px">'
          + '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="2.5" '
          + 'stroke-linejoin="round" stroke-linecap="round"/></svg>'
          + '<div style="display:flex;justify-content:space-between;font-size:10px;color:#888">'
          + '<span>min ' + fmt(min, 1) + '</span><span>max ' + fmt(max, 1) + '</span></div>';
      }

      function openReport(report, win) {
        var T = function (k) { return Homey.__('settings.report.' + k); };
        var s = report.series || {};
        var byDate = {};
        function put(entries, col, key) {
          (entries || []).forEach(function (e) {
            if (!byDate[e.date]) byDate[e.date] = {};
            byDate[e.date][col] = key ? e[key] : e.value;
          });
        }
        put(s.steps, 'steps'); put(s.distance_km, 'km'); put(s.floors, 'floors');
        put(s.active_zone_minutes, 'azm'); put(s.hydration_ml, 'water');
        put(s.resting_heart_rate, 'rhr'); put(s.hrv_ms, 'hrv');
        put(s.spo2_pct, 'spo2'); put(s.respiratory_rate, 'resp');
        put(s.sleep, 'sleep', 'hours'); put(s.sleep, 'deep', 'deepMinutes');
        put(s.weight_kg, 'weight');

        var dates = Object.keys(byDate).sort();
        var cols = [
          ['steps', T('col_steps'), 0], ['km', 'km', 2], ['floors', T('col_floors'), 0],
          ['azm', T('col_azm'), 0], ['water', T('col_water'), 0],
          ['rhr', T('col_rhr'), 0], ['hrv', 'HRV ms', 0], ['spo2', 'SpO2 %', 0],
          ['resp', T('col_resp'), 1], ['sleep', T('col_sleep'), 1],
          ['deep', T('col_deep'), 0], ['weight', T('col_weight'), 1],
        ];

        var rows = dates.map(function (d) {
          return '<tr><td>' + d + '</td>' + cols.map(function (c) {
            var v = byDate[d][c[0]];
            return '<td>' + (typeof v === 'number' ? fmt(v, c[2]) : '–') + '</td>';
          }).join('') + '</tr>';
        }).join('');

        var weightDelta = null;
        if (s.weight_kg && s.weight_kg.length >= 2) {
          weightDelta = s.weight_kg[s.weight_kg.length - 1].value - s.weight_kg[0].value;
        }
        var cards = [
          [T('avg_steps'), fmt(mean(s.steps), 0)],
          [T('avg_sleep'), fmt(mean(s.sleep, 'hours'), 1) + ' h'],
          [T('avg_rhr'), fmt(mean(s.resting_heart_rate), 0) + ' bpm'],
          [T('avg_spo2'), fmt(mean(s.spo2_pct), 0) + ' %'],
          [T('weight_change'), (weightDelta === null ? '–' : (weightDelta > 0 ? '+' : '') + fmt(weightDelta, 1) + ' kg')],
        ].map(function (c) {
          return '<div style="border:1px solid #ddd;border-radius:8px;padding:10px 14px;min-width:120px">'
            + '<div style="font-size:11px;color:#777">' + c[0] + '</div>'
            + '<div style="font-size:20px;font-weight:600">' + c[1] + '</div></div>';
        }).join('');

        var charts = [
          [T('col_steps'), sparkline(s.steps, null, '#DE3226')],
          [T('col_rhr'), sparkline(s.resting_heart_rate, null, '#B0413E')],
          [T('col_sleep'), sparkline(s.sleep, 'hours', '#4A6FA5')],
          [T('col_weight'), sparkline(s.weight_kg, null, '#3E7C59')],
        ].filter(function (c) { return c[1]; }).map(function (c) {
          return '<div style="margin:10px 0"><div style="font-size:12px;font-weight:600;margin-bottom:2px">'
            + c[0] + '</div>' + c[1] + '</div>';
        }).join('');

        var reportCss = 'h1{font-size:20px;margin:0 0 2px}h2{font-size:14px;margin:18px 0 6px}'
          + 'table{border-collapse:collapse;width:100%;font-size:10.5px;margin-top:6px}'
          + 'th,td{border:1px solid #ccc;padding:3px 5px;text-align:right;color:#222}'
          + 'th:first-child,td:first-child{text-align:left}'
          + 'thead{background:#f4f4f4}tr:nth-child(even){background:#fafafa}';

        var inner = '<h1>' + T('title') + '</h1>'
          + '<div style="font-size:12px;color:#555">' + report.meta.deviceName + ' · '
          + report.meta.from + ' – ' + report.meta.to + ' (' + report.meta.days + ' ' + T('days') + ') · '
          + T('generated') + ' ' + new Date(report.meta.generatedAt).toLocaleString() + '</div>'
          + '<div style="display:flex;gap:10px;flex-wrap:wrap;margin:14px 0">' + cards + '</div>'
          + charts
          + '<h2>' + T('daily_values') + '</h2>'
          + '<table><thead><tr><th>' + T('col_date') + '</th>'
          + cols.map(function (c) { return '<th>' + c[1] + '</th>'; }).join('')
          + '</tr></thead><tbody>' + rows + '</tbody></table>'
          + '<p style="font-size:10px;color:#777;margin-top:14px">' + T('disclaimer') + '</p>';

        var fullDoc = '<!doctype html><html><head><meta charset="utf-8"><title>' + T('title') + '</title>'
          + '<style>body{font-family:Arial,Helvetica,sans-serif;margin:28px;color:#222;background:#fff}'
          + reportCss + '@media print{.noprint{display:none}}</style></head><body>'
          + '<button class="noprint" onclick="window.print()" style="float:right;padding:8px 16px">'
          + T('print') + '</button>' + inner + '</body></html>';

        if (win) {
          // A separate tab worked (not available in the sandboxed settings iframe)
          win.document.open();
          win.document.write(fullDoc);
          win.document.close();
          return;
        }

        // Inline fallback: render on this page. Printing uses the @media print
        // rules that hide everything except the report.
        var scopedCss = reportCss.split('}').filter(function (rule) { return rule.trim(); })
          .map(function (rule) {
            var brace = rule.indexOf('{');
            var selectors = rule.slice(0, brace).split(',').map(function (sel) {
              return '#report_output ' + sel.trim();
            }).join(',');
            return selectors + rule.slice(brace) + '}';
          }).join('');

        var container = document.getElementById('report_output');
        container.innerHTML = '<div class="report-sheet"><style>' + scopedCss + '</style>'
          + '<div class="noprint" style="display:flex;gap:8px;margin-bottom:12px">'
          + '<button onclick="window.print()" style="padding:8px 16px">' + T('print') + '</button>'
          + '<button id="report_download" style="padding:8px 16px">' + T('download') + '</button>'
          + '</div>' + inner + '</div>';

        // Download as a standalone HTML file — opens outside the sandbox,
        // where the browser's print-to-PDF always works
        document.getElementById('report_download').addEventListener('click', function () {
          var blob = new Blob([fullDoc], { type: 'text/html' });
          var link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = 'health-report-' + report.meta.from + '-' + report.meta.to + '.html';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          setTimeout(function () { URL.revokeObjectURL(link.href); }, 5000);
        });

        reportStatus.textContent = Homey.__('settings.report.inline_ready');
        container.scrollIntoView({ behavior: 'smooth' });
      }

      Homey.ready();
    }
  </script>
</body>
</html>
