<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: var(--homey-font); color: var(--homey-text-color); }
    .wrap {
      height: 100%;
      box-sizing: border-box;
      padding: var(--homey-su-3);
      overflow-y: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
      gap: var(--homey-su-2);
    }
    .cell {
      position: relative;
      aspect-ratio: 1;
      border-radius: var(--homey-border-radius-default);
      background: color-mix(in srgb, var(--homey-text-color) 6%, transparent);
      border: 1px solid var(--homey-line-color);
      padding: 8px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }
    .cell .bg {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 62%;
      z-index: 0;
      opacity: 0.6;
      pointer-events: none;
    }
    .cell .bg svg { width: 100%; height: 100%; display: block; }
    .cell .ic, .cell .txt { position: relative; z-index: 1; }
    .cell .ic {
      width: 24px; height: 24px; flex: none;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: var(--c, var(--homey-text-color));
      background: color-mix(in srgb, var(--c, var(--homey-text-color)) 16%, transparent);
    }
    .cell .ic svg { width: 15px; height: 15px; display: block; }
    .cell .v {
      font-size: var(--homey-font-size-default);
      font-weight: var(--homey-font-weight-bold);
      line-height: 1.05;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cell .v .u { font-size: 11px; font-weight: var(--homey-font-weight-regular); color: var(--homey-text-color-light); }
    .cell .lab {
      font-size: 10px; line-height: 1.1; color: var(--homey-text-color-light);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .muted {
      display: flex; align-items: center; justify-content: center;
      height: 100%; padding: var(--homey-su-3); text-align: center;
      color: var(--homey-text-color-light); font-size: var(--homey-font-size-small);
    }
  </style>
</head>
<body>
  <div id="root"><div class="wrap"><div id="grid" class="grid"></div></div></div>
  <script type="text/javascript">
    var PATHS = {
      ecg: '<polyline points="1,12 7,12 9,7 11,17 12.5,9 14,12 23,12"/>',
      ecgVar: '<polyline points="1,12 4,12 5,8 6.5,15 8,10 9,12 12,12 13,6 14.5,17 16,11 17,12 23,12"/>',
      flame: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5Z"/>',
      footsteps: '<path d="M6.6 14.2c-1.2 0-2-1.4-1.7-3.1.3-1.8 1-3.6 2.2-3.6 1.1 0 1.6 1.3 1.4 2.9-.2 1.8-.8 3.8-1.9 3.8Z"/><path d="M15.6 20.1c-1.1 0-1.7-2-1.9-3.8-.2-1.6.3-2.9 1.4-2.9 1.2 0 1.9 1.8 2.2 3.6.3 1.7-.5 3.1-1.7 3.1Z"/>',
      route: '<path d="M5 20h6a3 3 0 0 0 0-6H9a3 3 0 0 1 0-6h3"/><circle cx="17" cy="6" r="2.4"/>',
      stairs: '<polyline points="3,20 7,20 7,16 11,16 11,12 15,12 15,8 20,8"/>',
      stopwatch: '<circle cx="12" cy="14" r="7"/><path d="M12 14V10M10 3h4M18.5 8l1.4-1.4"/>',
      chair: '<path d="M6 11V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4M4 11h16v3a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2ZM7 16v4M17 16v4"/>',
      lungs: '<path d="M12 4v8M12 12c0-2-1.4-3-3-3s-4 2-4 6c0 3 2 4 3.5 4S12 18 12 15M12 12c0-2 1.4-3 3-3s4 2 4 6c0 3-2 4-3.5 4S12 18 12 15"/>',
      scale: '<rect x="3.5" y="3.5" width="17" height="17" rx="3"/><path d="M8 14.5a4 4 0 0 1 8 0"/><path d="M12 14.5l2.2-1.8"/>',
      gauge: '<path d="M5 16a7 7 0 0 1 14 0"/><path d="M12 16l4-3"/><circle cx="12" cy="16" r="1"/>',
      droplet: '<path d="M12 3.5c3 3.5 5.5 6.5 5.5 9.5a5.5 5.5 0 0 1-11 0c0-3 2.5-6 5.5-9.5Z"/>',
      glucose: '<path d="M12 3.5c3 3.5 5.5 6.5 5.5 9.5a5.5 5.5 0 0 1-11 0c0-3 2.5-6 5.5-9.5Z"/><path d="M12 11v4M10 13h4"/>',
      thermo: '<path d="M14 13.5V6a2 2 0 0 0-4 0v7.5a4 4 0 1 0 4 0Z"/><path d="M12 13V9"/>',
      mountain: '<path d="M2 20l6.5-11 4 6 2.5-4 7 9Z"/>',
      moon: '<path d="M20 13.5A8 8 0 1 1 10.5 4 6.5 6.5 0 0 0 20 13.5Z"/>',
      waves: '<path d="M2 9q2.5-3 5 0t5 0t5 0"/><path d="M2 15q2.5-3 5 0t5 0t5 0"/>',
      wheat: '<path d="M12 21V9"/><path d="M12 9c0-2-1.2-3.6-3-4 .2 2 1.2 3.4 3 4ZM12 9c0-2 1.2-3.6 3-4-.2 2-1.2 3.4-3 4ZM12 14c-1.6 0-2.8-1-3-2.6 1.6 0 2.8 1 3 2.6ZM12 14c1.6 0 2.8-1 3-2.6-1.6 0-2.8 1-3 2.6Z"/>',
      molecule: '<circle cx="6" cy="8" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="12" cy="17" r="2"/><path d="M7.7 9.2l2.6 4.6M16.3 9.2l-2.6 4.6M8 8h8"/>',
      dot: '<circle cx="12" cy="12" r="6"/>',
    };
    var ICON_FOR = {
      measure_heart_rate: 'ecg', measure_resting_heart_rate: 'ecg', measure_hrv: 'ecgVar',
      measure_calories: 'flame', measure_active_calories: 'flame', measure_basal_calories: 'flame', measure_calorie_intake: 'flame',
      measure_steps: 'footsteps', measure_distance: 'route', measure_floors: 'stairs',
      measure_active_zone_minutes: 'stopwatch', measure_sedentary_minutes: 'chair',
      measure_vo2_max: 'lungs', measure_respiratory_rate: 'lungs',
      measure_weight: 'scale', measure_body_fat: 'gauge',
      measure_spo2: 'droplet', measure_glucose: 'glucose',
      measure_body_temperature: 'thermo', measure_skin_temp_variation: 'thermo',
      measure_altitude: 'mountain', measure_sleep_hours: 'moon', measure_hydration: 'waves',
      measure_carbs: 'wheat', measure_protein: 'molecule', measure_fat: 'droplet',
    };
    var RED = 'var(--homey-color-red)', BLUE = 'var(--homey-color-blue)',
      GREEN = 'var(--homey-color-green)', ORANGE = 'var(--homey-color-orange)', MONO = 'var(--homey-text-color)';
    var COLOR_FOR = {
      measure_heart_rate: RED, measure_resting_heart_rate: RED, measure_hrv: RED,
      measure_calories: ORANGE, measure_active_calories: ORANGE, measure_basal_calories: ORANGE, measure_calorie_intake: ORANGE,
      measure_carbs: ORANGE, measure_protein: ORANGE, measure_fat: ORANGE,
      measure_steps: GREEN, measure_distance: GREEN, measure_floors: GREEN, measure_active_zone_minutes: GREEN,
      measure_hydration: BLUE, measure_spo2: BLUE, measure_glucose: BLUE, measure_respiratory_rate: BLUE,
      measure_sleep_hours: MONO, measure_weight: MONO, measure_body_fat: MONO, measure_vo2_max: MONO,
      measure_body_temperature: MONO, measure_skin_temp_variation: MONO, measure_altitude: MONO, measure_sedentary_minutes: MONO,
    };
    // Stable order (matches the settings checkbox order)
    var ALL = [
      'measure_steps', 'measure_distance', 'measure_calories', 'measure_active_calories', 'measure_basal_calories',
      'measure_floors', 'measure_active_zone_minutes', 'measure_sedentary_minutes', 'measure_heart_rate',
      'measure_resting_heart_rate', 'measure_hrv', 'measure_vo2_max', 'measure_weight', 'measure_body_fat',
      'measure_spo2', 'measure_respiratory_rate', 'measure_body_temperature', 'measure_skin_temp_variation',
      'measure_altitude', 'measure_sleep_hours', 'measure_hydration', 'measure_calorie_intake', 'measure_carbs',
      'measure_protein', 'measure_fat', 'measure_glucose',
    ];
    var DEFAULT_ON = {
      measure_steps: 1, measure_active_calories: 1, measure_resting_heart_rate: 1,
      measure_sleep_hours: 1, measure_hydration: 1, measure_weight: 1,
    };

    function svgFor(m) {
      var inner = PATHS[ICON_FOR[m] || 'dot'] || PATHS.dot;
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';
    }
    function fmt(v, d) {
      if (v === null || v === undefined) return '–';
      try { return Number(v).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }); }
      catch (e) { return String(v); }
    }
    function unit(u) { return (u && u.length <= 4) ? u : ''; }
    // Subtle background sparkline of the metric's recent history.
    function sparkline(vals, color) {
      if (!vals || vals.length < 2) return '';
      var W = 100, H = 32, pad = 1, n = vals.length;
      var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
      if (min === max) { min -= 1; max += 1; }
      var X = function (i) { return pad + (i / (n - 1)) * (W - 2 * pad); };
      var Y = function (v) { return pad + (1 - (v - min) / (max - min)) * (H - 2 * pad); };
      var line = vals.map(function (v, i) { return X(i).toFixed(1) + ',' + Y(v).toFixed(1); }).join(' ');
      var area = 'M' + X(0).toFixed(1) + ',' + (H - pad) + ' L' + line.split(' ').join(' L') + ' L' + X(n - 1).toFixed(1) + ',' + (H - pad) + ' Z';
      return '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">'
        + '<path d="' + area + '" fill="' + color + '" opacity="0.16"/>'
        + '<polyline points="' + line + '" fill="none" stroke="' + color + '" stroke-width="1.4" '
        + 'stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" opacity="0.55"/>'
        + '</svg>';
    }

    function onHomeyReady(Homey) {
      var root = document.getElementById('root');
      var gridEl = document.getElementById('grid');
      var s = Homey.getSettings() || {};
      var dev = s.device;
      var deviceId = dev && typeof dev === 'object' ? dev.id : (typeof dev === 'string' ? dev : '');

      function on(id) {
        var k = 'show_' + id.replace('measure_', '');
        return s.hasOwnProperty(k) ? s[k] !== false : !!DEFAULT_ON[id];
      }
      var order = ALL.filter(on);

      var dataMap = {};
      function renderGrid() {
        gridEl.innerHTML = order.map(function (id) {
          var m = dataMap[id] || {};
          var color = COLOR_FOR[id] || MONO;
          var spark = sparkline(m.history, color);
          return '<div class="cell" data-id="' + id + '">'
            + (spark ? '<div class="bg">' + spark + '</div>' : '')
            + '<div class="ic" style="--c:' + color + '">' + svgFor(id) + '</div>'
            + '<div class="txt"><div class="v">' + fmt(m.value, m.decimals || 0)
            + (unit(m.units) ? ' <span class="u">' + unit(m.units) + '</span>' : '') + '</div>'
            + '<div class="lab">' + esc(m.title || '') + '</div></div></div>';
        }).join('');
      }

      function esc(x) {
        return String(x == null ? '' : x).replace(/[<>&"]/g, function (ch) {
          return { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[ch];
        });
      }
      function t(key, fallback) { try { return Homey.__(key) || fallback; } catch (e) { return fallback; } }
      function refresh() {
        if (!order.length) {
          root.innerHTML = '<div class="muted">' + t('widget.no_metrics', '') + '</div>';
          return;
        }
        Homey.api('GET', '/tiles?device=' + encodeURIComponent(deviceId) + '&metrics=' + encodeURIComponent(order.join(',')))
          .then(function (data) {
            if (!data || !data.paired) { root.innerHTML = '<div class="muted">—</div>'; return; }
            dataMap = {};
            (data.metrics || []).forEach(function (m) { dataMap[m.id] = m; });
            renderGrid();
          })
          .catch(function () { /* keep last render */ });
      }

      renderGrid();
      refresh();
      setInterval(refresh, 60000);
      Homey.ready();
    }
  </script>
</body>
</html>
